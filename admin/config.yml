backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "events"
    label: "Events"
    folder: "_data/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Event Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }

  - name: "news"
    label: "News"
    folder: "_data/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - label: "Category"
        name: "tag"
        widget: "select"
        options: ["Club News", "Competition", "Event Recap", "Brewing Tips", "Announcement"]
      - { label: "Short Summary", name: "excerpt", widget: "text" }
      - { label: "Full Article", name: "body", widget: "markdown" }

  - name: "recipes"
    label: "Recipes"
    folder: "_data/recipes"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Recipe Title", name: "title", widget: "string" }
      - { label: "Style", name: "style", widget: "string" }
      - { label: "Description / Tasting Notes", name: "description", widget: "text" }
      - { label: "Original Gravity (OG)", name: "og", widget: "string", required: false }
      - { label: "Final Gravity (FG)", name: "fg", widget: "string", required: false }
      - { label: "ABV %", name: "abv", widget: "string", required: false }
      - { label: "IBU", name: "ibu", widget: "string", required: false }
      - { label: "EBC", name: "ebc", widget: "string", required: false }
      - label: "Malt"
        name: "malt"
        widget: "list"
        field: { label: "Malt Entry", name: "entry", widget: "string" }
      - label: "Hops"
        name: "hops"
        widget: "list"
        field: { label: "Hop Entry", name: "entry", widget: "string" }
      - label: "Mash Steps"
        name: "mash_steps"
        widget: "list"
        fields:
          - { label: "Step Name", name: "name", widget: "string" }
          - { label: "Temperature", name: "temp", widget: "string" }
          - { label: "Time", name: "time", widget: "string" }
      - { label: "Yeast", name: "yeast", widget: "string", required: false }
